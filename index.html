<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Hub</title>
    <link rel="stylesheet" href="styles.css"> <!-- Reference to CSS for styling -->
</head>
<body>
    <header>
        <h1>Welcome to Home Hub</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#properties">Properties</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="property-search">
            <h2>Search for Properties</h2>
            <form>
                <input type="text" placeholder="Enter location" required>
                <input type="number" placeholder="Min Price" min="0">
                <input type="number" placeholder="Max Price" min="0">
                <button type="submit">Search</button>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 Home Hub. All rights reserved.</p>
    </footer>
</body>
</html>
