<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Detail</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Property Detail</h1>
    </header>
    <main>
        <section class="property-details">
            <h2>Property Name</h2>
            <p class="description">Description of the property goes here.</p>
            <div class="pricing">
                <span class="price">$Price</span>
                <span class="status">Status: Available/Not Available</span>
            </div>
            <h3>Features:</h3>
            <ul class="features">
                <li>Feature 1</li>
                <li>Feature 2</li>
                <li>Feature 3</li>
            </ul>
            <button>Contact Agent</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Home Hub. All rights reserved.</p>
    </footer>
</body>
</html>
